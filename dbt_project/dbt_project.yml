# dbt_project.yml
# ================
# dbt project configuration
# Replace 'your_project' with your actual project name

name: 'IBM_Capstone_Project'          # ← change this
version: '1.0.0'
config-version: 2

profile: 'IBM_Capstone_Project'       # ← must match profiles.yml

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  your_project:               # ← change this to match name above
    staging:
      +materialized: view     # staging = views (always fresh)
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table    # marts = tables (fast to query)
      +schema: analytics
